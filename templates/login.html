{% extends "base.html" %}
{% block content %}
<div class="container">

    <div>
        <div class="speech">
            Welcome to Offenzo CTF.
        </div>
        <img src="{{ url_for('static', filename='images/hacker.png') }}" class="hacker-img">
    </div>

    <div class="login-box">
        <h2>Login</h2>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have account? <a href="/register">Create Account</a></p>
    </div>

</div>
{% endblock %}
