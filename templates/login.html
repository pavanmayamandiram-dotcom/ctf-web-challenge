{% extends "base.html" %}
{% block content %}

<div class="container">

    <div class="login-box">
        <h2>OFFENZO CTF</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p style="margin-top:15px;">
            No account? <a href="/register" style="color:#00ff99;">Create Account</a>
        </p>
    </div>

</div>

{% endblock %}
