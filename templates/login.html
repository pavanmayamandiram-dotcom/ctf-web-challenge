<!DOCTYPE html>
<html>
<head>
    <title>Offenzo CTF | Secure Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<canvas id="matrix"></canvas>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-section">
        <img src="{{ url_for('static', filename='images/hacker.png') }}" class="hacker-img">

        <div class="speech">
            👋 Hi, Welcome to Offenzo CTF <br>
            Break the logic. Capture the flag.
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-section">
        <div class="login-box">
            <h1>OFFENZO CTF</h1>
            <p>Cyber Security Challenge Platform</p>

            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">ACCESS SYSTEM</button>
            </form>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </div>
    </div>

</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01OFFENZOCTF";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff99";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 40);
</script>

</body>
</html>
