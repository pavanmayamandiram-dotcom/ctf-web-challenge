<script>
const text = "Welcome to Offenzo CTF. Begin with Broken Access Control. Observe carefully. Think like an attacker.";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("guideText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 35);
    }
}

window.onload = function() {
    if (!sessionStorage.getItem("guideShown")) {
        typeEffect();
        sessionStorage.setItem("guideShown", "true");
    } else {
        document.getElementById("guideText").innerHTML = text;
    }
};
</script>
